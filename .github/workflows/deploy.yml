name: Deploy Astro site to GitHub Pages

on:
  push:
    branches:
      - main # ou master selon ta branche

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Étape 1 : Installer Node.js (sans cache pnpm)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Étape 2 : Activer Corepack pour gérer pnpm automatiquement
      - name: Enable Corepack
        run: corepack enable

      # Étape 3 : Forcer Corepack à utiliser la bonne version de pnpm
      - name: Prepare pnpm
        run: corepack prepare pnpm@10.18.2 --activate

      # Étape 4 : Vérifier la version (juste pour debug)
      - name: Check pnpm version
        run: pnpm --version

      # Étape 5 : Installer les dépendances
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Étape 6 : Build du site Astro
      - name: Build project
        run: pnpm run build

      # Étape 7 : Upload du dossier dist
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
